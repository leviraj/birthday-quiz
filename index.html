<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🦛🎉</title>
    <style>
        /* --- Core Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #d1d5db; /* Clean Grey Background */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            min-height: 550px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        /* --- Hippo Vector Art Styles --- */
        .hippo-wrapper {
            position: relative;
            width: 180px;
            height: 170px;
            margin-bottom: -10px;
        }

        .hippo-head {
            width: 140px;
            height: 120px;
            background: #9ca3af;
            border-radius: 70px 70px 60px 60px;
            position: absolute;
            left: 20px;
            top: 20px;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.08);
        }

        .hippo-ear-l, .hippo-ear-r {
            width: 30px;
            height: 35px;
            background: #9ca3af;
            border-radius: 50%;
            position: absolute;
            top: 5px;
        }
        .hippo-ear-l { left: 25px; transform: rotate(-20px); }
        .hippo-ear-r { right: 25px; transform: rotate(20px); }
        
        .hippo-ear-inner {
            width: 16px;
            height: 22px;
            background: #fca5a5;
            border-radius: 50%;
            margin: 6px auto 0;
        }

        .hippo-eye-l, .hippo-eye-r {
            width: 16px;
            height: 20px;
            background: #1f2937;
            border-radius: 50%;
            position: absolute;
            top: 45px;
        }
        .hippo-eye-l { left: 45px; }
        .hippo-eye-r { right: 45px; }
        
        .hippo-pupil {
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            margin: 3px 0 0 3px;
        }

        .hippo-snout {
            width: 150px;
            height: 75px;
            background: #babfc7;
            border-radius: 40px;
            position: absolute;
            bottom: -5px;
            left: -5px;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.05);
        }

        .hippo-nostril-l, .hippo-nostril-r {
            width: 12px;
            height: 16px;
            background: #717680;
            border-radius: 50%;
            position: absolute;
            top: 22px;
        }
        .hippo-nostril-l { left: 45px; transform: rotate(-10deg); }
        .hippo-nostril-r { right: 45px; transform: rotate(10deg); }

        .hippo-smile {
            width: 60px;
            height: 20px;
            border-bottom: 4px solid #4b5563;
            border-radius: 0 0 30px 30px;
            position: absolute;
            bottom: 12px;
            left: 45px;
        }

        /* --- Board Design --- */
        .notice-board {
            background: #374151;
            border: 12px solid #854d0e;
            border-radius: 12px;
            width: 100%;
            padding: 25px 15px;
            color: #f9fafb;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .board-text {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.5;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* --- Interactive UI Elements --- */
        .btn {
            background: #ec4899;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #f472b6;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(236, 72, 153, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .question-title {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* --- 3D Gift Box Animation Setup --- */
        .gift-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 25px auto;
            cursor: pointer;
            perspective: 600px;
        }

        .gift-box {
            width: 100%;
            height: 100%;
            position: absolute;
            animation: bounceGift 1.5s infinite alternate ease-in-out;
        }

        .gift-lid {
            width: 150px;
            height: 35px;
            background: #ef4444;
            position: absolute;
            top: 0;
            left: -5px;
            z-index: 2;
            border-radius: 4px;
            box-shadow: 0 4px 5px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }

        .gift-body {
            width: 140px;
            height: 105px;
            background: #dc2626;
            position: absolute;
            bottom: 0;
            border-radius: 0 0 8px 8px;
        }

        .gift-bow {
            width: 40px;
            height: 40px;
            background: #facc15;
            position: absolute;
            top: -25px;
            left: 50px;
            border-radius: 50% 50% 0 50%;
            transform: rotate(-45deg);
        }
        .gift-bow::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: #facc15;
            border-radius: 50% 50% 50% 0;
            transform: rotate(90deg);
            left: 15px;
            top: 15px;
        }

        .ribbon-v {
            width: 24px;
            height: 100%;
            background: #facc15;
            position: absolute;
            left: 58px;
            top: 0;
        }

        .ribbon-h {
            width: 100%;
            height: 20px;
            background: #facc15;
            position: absolute;
            top: 40px;
            left: 0;
        }

        /* Open Gift State Trigger */
        .gift-container.opened .gift-lid {
            transform: translateY(-60px) rotate(-25deg) scale(0.9);
            opacity: 0;
        }

        @keyframes bounceGift {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-8px) scale(1.03); }
        }

        /* --- Bubble Font Celebration --- */
        .bubble-wish {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #ec4899, #8b5cf6, #3b82f6, #10b981, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15px;
            letter-spacing: 1px;
            animation: rainbowText 4s infinite linear;
            line-height: 1.3;
        }

        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Canvas Particle Layer overlay */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <!-- Celebration Animation Layer -->
    <canvas id="canvas"></canvas>

    <div class="card-container">
        
        <!-- ================= PAGE 1: START SCREEN ================= -->
        <div id="page-1" class="page-view">
            <!-- Vector Hippo Setup -->
            <div class="hippo-wrapper">
                <div class="hippo-ear-l"><div class="hippo-ear-inner"></div></div>
                <div class="hippo-ear-r"><div class="hippo-ear-inner"></div></div>
                <div class="hippo-head">
                    <div class="hippo-eye-l"><div class="hippo-pupil"></div></div>
                    <div class="hippo-eye-r"><div class="hippo-pupil"></div></div>
                    <div class="hippo-snout">
                        <div class="hippo-nostril-l"></div>
                        <div class="hippo-nostril-r"></div>
                        <div class="hippo-smile"></div>
                    </div>
                </div>
            </div>

            <!-- Blackboard Sign -->
            <div class="notice-board">
                <div class="board-text">Happy Birthday hun!<br>Let's start!</div>
            </div>

            <button class="btn" onclick="actionStartQuiz()">Let's start</button>
        </div>

        <!-- ================= PAGE 2: INTERACTIVE QUESTIONS ================= -->
        <div id="page-2" class="page-view hidden">
            <h2 class="question-title" id="display-question">Question Text Here</h2>
            <div id="display-options-box" style="width: 100%;">
                <!-- Dynamic options injected here -->
            </div>
        </div>

        <!-- ================= PAGE 3: FINAL CELEBRATORY SCREEN ================= -->
        <div id="page-3" class="page-view hidden">
            <!-- Hippo Component Redrawn for End Page -->
            <div class="hippo-wrapper" style="transform: scale(0.85); margin-bottom: -20px;">
                <div class="hippo-ear-l"><div class="hippo-ear-inner"></div></div>
                <div class="hippo-ear-r"><div class="hippo-ear-inner"></div></div>
                <div class="hippo-head">
                    <div class="hippo-eye-l"><div class="hippo-pupil"></div></div>
                    <div class="hippo-eye-r"><div class="hippo-pupil"></div></div>
                    <div class="hippo-snout">
                        <div class="hippo-nostril-l"></div>
                        <div class="hippo-nostril-r"></div>
                        <div class="hippo-smile"></div>
                    </div>
                </div>
            </div>

            <!-- Clickable Interactive 3D Gift -->
            <div class="gift-container" id="clickable-gift" onclick="actionRevealGift()">
                <div class="gift-box">
                    <div class="gift-bow"></div>
                    <div class="gift-lid">
                        <div class="ribbon-v" style="left: 63px;"></div>
                    </div>
                    <div class="gift-body">
                        <div class="ribbon-v"></div>
                        <div class="ribbon-h"></div>
                    </div>
                </div>
            </div>

            <!-- Interaction Label / Reward Banner -->
            <button class="btn" id="gift-action-btn" onclick="actionRevealGift()">🎁 Click Box to Open!</button>
            <div class="bubble-wish hidden" id="final-bubble-text">HAPPY BIRTHDAY MY LOVE</div>
        </div>

    </div>

    <!-- --- Interactivity Engine --- -->
    <script>
        // Quiz Data Architecture
        const databaseQuiz = [
            {
                q: "Are you the best",
                opts: ["yes", "maybe", "idk"],
                ans: 0 // Index 0 matches "yes"
            },
            {
                q: "Are you the best",
                opts: ["yes", "YES", "YESSS"],
                ans: 2 // Index 2 matches "YESSS"
            },
            {
                q: "Do i love you so much",
                opts: ["no", "is that a thing to ask", "maybe"],
                ans: 1 // Index 1 matches "is that a thing to ask"
            }
        ];

        let indexPointer = 0;

        // Engine Page Routers
        function actionStartQuiz() {
            triggerConfettiBurst("mix");
            setTimeout(() => {
                document.getElementById('page-1').classList.add('hidden');
                document.getElementById('page-2').classList.remove('hidden');
                renderCurrentQuestion();
            }, 400);
        }

        function renderCurrentQuestion() {
            const activeData = databaseQuiz[indexPointer];
            document.getElementById('display-question').innerText = activeData.q;
            
            const container = document.getElementById('display-options-box');
            container.innerHTML = '';

            activeData.opts.forEach((label, idx) => {
                const choiceBtn = document.createElement('button');
                choiceBtn.className = 'btn';
                choiceBtn.innerText = label;
                choiceBtn.onclick = () => verifySelection(idx);
                container.appendChild(choiceBtn);
            });
        }

        function verifySelection(userIndex) {
            const correctIndex = databaseQuiz[indexPointer].ans;
            
            if (userIndex === correctIndex) {
                triggerConfettiBurst("mix");
                indexPointer++;
                
                setTimeout(() => {
                    if (indexPointer < databaseQuiz.length) {
                        renderCurrentQuestion();
                    } else {
                        document.getElementById('page-2').classList.add('hidden');
                        document.getElementById('page-3').classList.remove('hidden');
                    }
                }, 600);
            } else {
                alert("Opps! Try choosing another option! 😘");
            }
        }

        function actionRevealGift() {
            const giftBoxEl = document.getElementById('clickable-gift');
            if (!giftBoxEl.classList.contains('opened')) {
                giftBoxEl.classList.add('opened');
                
                // Fire dynamic looping hearts bursts
                triggerConfettiBurst("hearts");
                setTimeout(() => triggerConfettiBurst("hearts"), 300);
                setTimeout(() => triggerConfettiBurst("hearts"), 600);

                // Update UI layout element flags
                document.getElementById('gift-action-btn').classList.add('hidden');
                document.getElementById('final-bubble-text').classList.remove('hidden');
            }
        }

        /* --- Dual-Mode Particle System (Confetti & Hearts) --- */
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let activeParticles = [];

        function scaleCanvasViewport() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", scaleCanvasViewport);
        scaleCanvasViewport();

        function triggerConfettiBurst(particleType) {
            const totalCount = particleType === "hearts" ? 60 : 120;
            const originX = canvas.width / 2;
            const originY = canvas.height / 2 + 50;

            for (let i = 0; i < totalCount; i++) {
                activeParticles.push({
                    x: originX,
                    y: originY,
                    type: particleType === "mix" ? (Math.random() > 0.4 ? "confetti" : "heart") : "heart",
                    size: Math.random() * 8 + (particleType === "hearts" ? 10 : 5),
                    color: particleType === "hearts" 
                        ? `hsl(${Math.random() * 20 + 340}, 100%, ${Math.random() * 20 + 50}%)`
                        : `hsl(${Math.random() * 360}, 90%, 60%)`,
                    speedX: (Math.random() - 0.5) * 15,
                    speedY: (Math.random() - 0.7) * 18,
                    gravity: 0.3,
                    opacity: 1,
                    rotation: Math.random() * Math.PI,
                    rotationSpeed: (Math.random() - 0.5) * 0.1
                });
            }
        }

        function renderHeartShape(context, x, y, size) {
            context.moveTo(x, y + size / 4);
            context.quadraticCurveTo(x, y, x + size / 2, y);
            context.quadraticCurveTo(x + size, y, x + size, y + size / 3);
            context.quadraticCurveTo(x + size, y + (size * 2) / 3, x + size / 2, y + size);
            context.quadraticCurveTo(x, y + (size * 2) / 3, x, y + size / 3);
            context.quadraticCurveTo(x, y, x, y + size / 4);
        }

        function runParticleLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = activeParticles.length - 1; i >= 0; i--) {
                let p = activeParticles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += p.gravity;
                p.opacity -= 0.015;
                p.rotation += p.rotationSpeed;

                ctx.save();
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);

                ctx.beginPath();
                if (p.type === "heart") {
                    renderHeartShape(ctx, -p.size/2, -p.size/2, p.size);
                } else {
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 2);
                }
                ctx.fill();
                ctx.restore();

                if (p.opacity <= 0) {
                    activeParticles.splice(i, 1);
                }
            }
            requestAnimationFrame(runParticleLoop);
        }
        runParticleLoop();
    </script>
</body>
</html>
